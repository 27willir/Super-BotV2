<!DOCTYPE html>
<html>
<head>
    <title>Login - Super Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Page background */
        body {
            font-family: "Orbitron", "Exo 2", "Rajdhani", "Roboto Mono", "Courier New", monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            line-height: 1.6;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(0, 123, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 123, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 123, 255, 0.05) 0%, transparent 50%);
            z-index: -1;
            animation: particleFloat 20s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Login box */
        .login-box {
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(20px);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(0, 191, 255, 0.15);
            border: 1px solid rgba(0, 191, 255, 0.2);
            width: 400px;
            position: relative;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 191, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 32px;
            color: #00bfff;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 0 25px rgba(0, 191, 255, 0.6);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        /* Inputs */
        input {
            display: block;
            margin: 18px 0;
            padding: 16px 20px;
            width: 100%;
            border-radius: 12px;
            border: 2px solid rgba(0, 191, 255, 0.3);
            background: rgba(22, 33, 62, 0.8);
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        input:focus {
            outline: none;
            border-color: #00bfff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.3);
            background: rgba(22, 33, 62, 0.9);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Button */
        button {
            padding: 18px;
            width: 100%;
            background: linear-gradient(135deg, #007bff 0%, #00bfff 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(0, 191, 255, 0.3);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: linear-gradient(135deg, #00bfff 0%, #007bff 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 191, 255, 0.5);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 191, 255, 0.4);
        }

        /* Footer / optional links */
        .login-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            z-index: 1;
            position: relative;
        }

        .login-footer a {
            color: #00bfff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(0, 191, 255, 0.5);
        }

        /* Flash messages */
        .flash-message {
            padding: 12px 15px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 1px solid;
            z-index: 1;
            position: relative;
        }

        .flash-success {
            background: rgba(0, 255, 136, 0.9);
            color: white;
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }

        .flash-error {
            background: rgba(255, 71, 87, 0.9);
            color: white;
            border-color: rgba(255, 71, 87, 0.5);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Super Bot Login</h2>
        
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="login-footer">
             <a href="/register">Create Account</a> | <a href="/resend-verification">Resend verification</a>      
        </div>
    </div>
</body>
</html>
