<!DOCTYPE html>
<html>
<head>
    <title>Resend Verification - Super Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700;800&family=Rajdhani:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Orbitron", "Exo 2", "Rajdhani", "Roboto Mono", "Courier New", monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .login-box { background: rgba(26, 26, 46, 0.85); backdrop-filter: blur(20px); padding: 40px 32px; border-radius: 16px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(0, 191, 255, 0.15); border: 1px solid rgba(0, 191, 255, 0.2); width: 420px; }
        h2 { text-align: center; margin-bottom: 20px; color: #00bfff; font-size: 24px; font-weight: 800; text-shadow: 0 0 25px rgba(0, 191, 255, 0.6); }
        input { display: block; margin: 14px 0; padding: 14px 16px; width: 100%; border-radius: 10px; border: 2px solid rgba(0, 191, 255, 0.3); background: rgba(22, 33, 62, 0.8); color: #ffffff; box-sizing: border-box; }
        button { padding: 14px; width: 100%; background: linear-gradient(135deg, #007bff 0%, #00bfff 100%); color: #ffffff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .flash-message { padding: 12px 15px; margin: 15px 0; border-radius: 8px; text-align: center; font-weight: 600; backdrop-filter: blur(10px); border: 1px solid; }
        .flash-success { background: rgba(0, 255, 136, 0.9); color: white; border-color: rgba(0, 255, 136, 0.5); }
        .flash-error { background: rgba(255, 71, 87, 0.9); color: white; border-color: rgba(255, 71, 87, 0.5); }
        .login-footer { text-align: center; margin-top: 15px; }
        .login-footer a { color: #00bfff; }
    </style>
    </head>
<body>
    <div class="login-box">
        <h2>Resend Verification</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="email" placeholder="Email or Username" required>
            <button type="submit">Send</button>
        </form>
        <div class="login-footer">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</body>
</html>
